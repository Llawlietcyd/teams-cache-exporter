<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teams Cache Exporter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <h1 id="appTitle">Teams Cache Exporter</h1>
      <p id="subtitle" class="subtitle">Export the currently open Teams chat from browser cache.</p>

      <section class="group">
        <div id="outputGroupTitle" class="group-title">Output files</div>
        <label class="toggle">
          <input id="outputJson" type="checkbox">
          <span id="outputJsonLabel">Cleaned JSON</span>
        </label>
        <label class="toggle">
          <input id="outputCsv" type="checkbox">
          <span id="outputCsvLabel">CSV for Excel</span>
        </label>
        <label class="toggle">
          <input id="outputMarkdown" type="checkbox">
          <span id="outputMarkdownLabel">Markdown transcript</span>
        </label>
      </section>

      <section class="group">
        <div id="optionsGroupTitle" class="group-title">Options</div>
        <label class="toggle">
          <input id="dropSystem" type="checkbox">
          <span id="dropSystemLabel">Hide system messages</span>
        </label>
        <label class="toggle">
          <input id="includeRaw" type="checkbox">
          <span id="includeRawLabel">Include raw cache dump</span>
        </label>
      </section>

      <button id="exportBtn" class="primary">Export current chat</button>

      <section class="panel">
        <div id="status" class="status">Open a Teams chat, then click export.</div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
